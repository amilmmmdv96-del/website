ame: Coffeeshop CI-CD Pipeline

on:
  push:
    branches: ["main"]  # Kod bu branch-ə birləşəndə (merge) sayt yayımlanacaq
  pull_request:
    branches: ["amil/website-pipeline"] # Bu branch-ə PR açıldıqda testlər işləyəcək

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1. TEST MƏRHƏLƏSİ (CI)
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint HTML/JS (Sadə sintaksis yoxlanışı)
        run: |
          echo "Veb faylları yoxlanılır..."
          test -f index.html && echo "index.html mövcuddur."
          test -f style.css && echo "style.css mövcuddur."
          test -f script.js && echo "script.js mövcuddur."

  # 2. YAYIMLAMA MƏRHƏLƏSİ (CD)
  deploy:
    needs: test-and-validate
    # Şərt: Yalnız 'main' branch-inə edilən push/merge zamanı işləsin
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4